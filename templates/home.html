{% extends "base.html" %}

{% block title %}{% endblock title %}

{% block content %}

<h1>Below is the list of all the objects in the database</h1>



<table border="2px">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
    </tr>
    {% for i in items %}
    <tr>
        <td>{{ i.name }}</td>
        <td>{{ i.age }}</td>
        <td>{{ i.gender }}</td>
    </tr>
    {% endfor %}
</table>

<h3>Make your Entries Below</h3>

<form method="POST">
    {% csrf_token %}
    <label>Name: <input type="text" name="name"></label>
    <label>Age: <input type="text" name="age"></label>
    <label>Gender: <input type="text" name="gender"></label>
    <button type='submit'>Submit</button>
</form>

{% endblock content %}
